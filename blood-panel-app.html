<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Panel Analysis System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #fafaf8;
            color: #2C2C2C;
        }
        
        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React from CDN -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- Main App -->
    <script type="text/babel">
        const { useState, useRef } = React;

        // ============================================================================
        // BLOOD PANEL ANALYSIS SYSTEM
        // ============================================================================

        const BloodPanelApp = () => {
            // Global state
            const [step, setStep] = useState('upload'); // upload, select, recommend, log
            const [biomarkers, setBiomarkers] = useState([]);
            const [recommendations, setRecommendations] = useState({});
            const [selectedBiomarkers, setSelectedBiomarkers] = useState([]);
            const [loggedFoods, setLoggedFoods] = useState([]);
            const [showNormalMarkers, setShowNormalMarkers] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [selectedScience, setSelectedScience] = useState(null);

            const fileInputRef = useRef(null);

            // ========================================================================
            // STEP 1: PDF PARSING
            // ========================================================================

            const handlePDFUpload = async (file) => {
                if (!file) return;
                
                setLoading(true);
                setError('');
                
                try {
                    let extractedText = '';
                    
                    // Try PDF.js first
                    try {
                        extractedText = await parsePDFWithPDFJS(file);
                    } catch (e) {
                        console.log('PDF.js failed, trying Tesseract...');
                        // Fallback to Tesseract OCR
                        extractedText = await parsePDFWithTesseract(file);
                    }
                    
                    // Parse biomarkers from extracted text
                    const parsedBiomarkers = extractBiomarkersFromText(extractedText);
                    
                    if (parsedBiomarkers.length === 0) {
                        setError('Could not extract biomarkers. Try entering values manually or use our sample PDF.');
                        setLoading(false);
                        return;
                    }
                    
                    // Classify as abnormal/normal
                    const classified = classifyBiomarkers(parsedBiomarkers);
                    setBiomarkers(classified);
                    
                    // Pre-select abnormal ones
                    const abnormalNames = classified
                        .filter(b => b.status !== 'Normal')
                        .map(b => b.name);
                    setSelectedBiomarkers(abnormalNames);
                    
                    setStep('select');
                } catch (err) {
                    setError('Error parsing PDF: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const parsePDFWithPDFJS = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    
                    reader.onload = async (e) => {
                        try {
                            const pdf = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
                            let text = '';
                            
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                text += content.items.map(item => item.str).join(' ') + '\n';
                            }
                            
                            resolve(text);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    
                    reader.readAsArrayBuffer(file);
                });
            };

            const parsePDFWithTesseract = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    
                    reader.onload = async (e) => {
                        try {
                            const result = await Tesseract.recognize(e.target.result);
                            resolve(result.data.text);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    
                    reader.readAsDataURL(file);
                });
            };

            const extractBiomarkersFromText = (text) => {
                // Simple parsing logic - extract common biomarker patterns
                const biomarkerPatterns = [
                    { name: 'Blood Pressure', regex: /blood\s+pressure|bp|systolic|diastolic/i },
                    { name: 'WBC', regex: /wbc|white\s+blood\s+cell/i },
                    { name: 'MPV', regex: /mpv|mean\s+platelet\s+volume/i },
                    { name: 'Potassium', regex: /potassium|k\+|serum\s+k/i },
                    { name: 'Iron', regex: /iron|ferritin|serum\s+iron/i },
                    { name: 'Cholesterol', regex: /cholesterol|total\s+cholesterol|ldl|hdl|triglyceride/i },
                    { name: 'Glucose', regex: /glucose|blood\s+sugar|fasting\s+glucose/i },
                    { name: 'Hemoglobin', regex: /hemoglobin|hgb|hb/i },
                    { name: 'Vitamin B12', regex: /b12|vitamin\s+b12|cobalamin/i },
                ];

                const found = [];
                
                biomarkerPatterns.forEach(pattern => {
                    if (pattern.regex.test(text)) {
                        // Extract associated value (simplified)
                        const valueMatch = text.match(new RegExp(pattern.regex.source + '\\s+([0-9.]+)', 'i'));
                        found.push({
                            name: pattern.name,
                            value: valueMatch ? parseFloat(valueMatch[1]) : null,
                            unit: 'unit',
                            status: 'Unknown'
                        });
                    }
                });

                return found;
            };

            const classifyBiomarkers = (biomarkers) => {
                const referenceRanges = {
                    'Blood Pressure': { normal: [120, 80], high: 140 },
                    'WBC': { normal: [4.5, 11.0], low: 3.5, high: 15 },
                    'MPV': { normal: [7.5, 11.5], low: 6, high: 12 },
                    'Potassium': { normal: [3.5, 5.0], low: 3.2, high: 6 },
                    'Iron': { normal: [60, 170], low: 40, high: 200 },
                    'Cholesterol': { normal: 200, high: 240 },
                    'Glucose': { normal: 100, high: 125 },
                    'Hemoglobin': { normal: { male: [13.5, 17.5], female: [12, 15.5] } },
                    'Vitamin B12': { normal: [200, 1100], low: 150 }
                };

                return biomarkers.map(bio => {
                    let status = 'Normal';
                    const range = referenceRanges[bio.name];
                    
                    if (bio.value !== null && range) {
                        if (Array.isArray(range.normal)) {
                            if (bio.value < range.normal[0]) status = 'Low';
                            else if (bio.value > range.normal[1]) status = 'High';
                        } else if (bio.value > range.normal) {
                            status = 'High';
                        }
                    }
                    
                    return { ...bio, status };
                });
            };

            // ========================================================================
            // STEP 2: BIOMARKER SELECTION (Option 2)
            // ========================================================================

            const toggleBiomarker = (name) => {
                setSelectedBiomarkers(prev =>
                    prev.includes(name)
                        ? prev.filter(b => b !== name)
                        : [...prev, name]
                );
            };

            const handleGetRecommendations = async () => {
                setLoading(true);
                
                try {
                    const recs = {};
                    
                    for (const bioName of selectedBiomarkers) {
                        // Query USDA API for foods matching this biomarker
                        const foods = await queryUSDAForBiomarker(bioName);
                        recs[bioName] = foods;
                    }
                    
                    setRecommendations(recs);
                    setStep('recommend');
                } catch (err) {
                    setError('Error fetching recommendations: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const queryUSDAForBiomarker = async (biomarker) => {
                // Map biomarkers to nutrients and foods
                const biomarkerToNutrient = {
                    'Blood Pressure': 'potassium spinach',
                    'WBC': 'vitamin c citrus',
                    'MPV': 'folate leafy',
                    'Potassium': 'potassium banana',
                    'Iron': 'iron lentils',
                    'Cholesterol': 'fiber oats',
                    'Glucose': 'fiber berries',
                    'Hemoglobin': 'iron spinach',
                    'Vitamin B12': 'vitamin b12 mushrooms'
                };

                const query = biomarkerToNutrient[biomarker] || biomarker;
                
                try {
                    const response = await fetch(
                        `https://fdc.nal.usda.gov/api/foods/search?query=${query}&pageSize=8`
                    );
                    const data = await response.json();
                    
                    return data.foods
                        ? data.foods.slice(0, 5).map(food => ({
                            name: food.description,
                            nutrient: query.split(' ')[0],
                            value: food.foodNutrients?.[0]?.value || 'N/A',
                            why: `Rich in nutrients that support ${biomarker.toLowerCase()}`
                          }))
                        : [];
                } catch (err) {
                    console.error('USDA API error:', err);
                    // Fallback to hardcoded recommendations
                    return getHardcodedRecommendations(biomarker);
                }
            };

            const getHardcodedRecommendations = (biomarker) => {
                const hardcoded = {
                    'Blood Pressure': [
                        { name: 'Spinach', nutrient: 'potassium', value: '558mg/100g', why: 'High in potassium to support blood pressure' },
                        { name: 'Kale', nutrient: 'potassium', value: '447mg/100g', why: 'Rich in potassium and fiber' },
                        { name: 'Banana', nutrient: 'potassium', value: '358mg/100g', why: 'Excellent potassium source' }
                    ],
                    'WBC': [
                        { name: 'Orange', nutrient: 'vitamin c', value: '53mg/100g', why: 'High in vitamin C for immune support' },
                        { name: 'Bell Pepper', nutrient: 'vitamin c', value: '128mg/100g', why: 'Excellent source of vitamin C' },
                        { name: 'Kiwi', nutrient: 'vitamin c', value: '93mg/100g', why: 'Rich in vitamin C' }
                    ],
                    'Iron': [
                        { name: 'Lentils', nutrient: 'iron', value: '6.5mg/100g', why: 'Plant-based iron powerhouse' },
                        { name: 'Spinach', nutrient: 'iron', value: '2.7mg/100g', why: 'Good iron source' },
                        { name: 'Pumpkin Seeds', nutrient: 'iron', value: '8.8mg/100g', why: 'High in iron' }
                    ],
                    'Cholesterol': [
                        { name: 'Oats', nutrient: 'fiber', value: '10.6g/100g', why: 'Soluble fiber reduces cholesterol' },
                        { name: 'Berries', nutrient: 'fiber', value: '5-7g/100g', why: 'Fiber-rich antioxidants' },
                        { name: 'Beans', nutrient: 'fiber', value: '7g/100g', why: 'Excellent fiber source' }
                    ]
                };

                return hardcoded[biomarker] || [
                    { name: 'Spinach', nutrient: 'nutrients', value: 'high', why: 'Nutrient-dense green vegetable' }
                ];
            };

            // ========================================================================
            // STEP 3: RECOMMENDATIONS
            // ========================================================================

            const groupRecommendationsBySystem = () => {
                const systems = {
                    '💚 Heart Health': ['Blood Pressure', 'Cholesterol'],
                    '🧠 Energy & Brain': ['Glucose', 'Iron', 'Vitamin B12'],
                    '🦴 Strength & Immunity': ['WBC', 'Potassium'],
                    '🫧 Blood Function': ['Hemoglobin', 'MPV']
                };

                const grouped = {};
                
                Object.entries(systems).forEach(([system, biomarkerNames]) => {
                    const systemRecs = [];
                    
                    biomarkerNames.forEach(name => {
                        if (recommendations[name]) {
                            systemRecs.push({
                                biomarker: name,
                                foods: recommendations[name]
                            });
                        }
                    });
                    
                    if (systemRecs.length > 0) {
                        grouped[system] = systemRecs;
                    }
                });

                return grouped;
            };

            const scienceExplanations = {
                'potassium': 'Potassium helps regulate blood pressure by balancing sodium levels and supporting heart function. Studies show increasing dietary potassium by 1,000mg/day can lower systolic blood pressure by 3-4 mmHg.',
                'iron': 'Iron is essential for hemoglobin production. Without adequate iron, your body cannot transport oxygen efficiently, leading to fatigue and weakness. Plant-based iron (non-heme) absorbs better when consumed with Vitamin C.',
                'vitamin c': 'Vitamin C enhances iron absorption in the digestive tract by up to 300%. Consuming citrus fruits or bell peppers with iron-rich foods significantly improves iron uptake.',
                'fiber': 'Soluble fiber binds to cholesterol in the digestive tract and removes it from circulation. Studies show 10g of soluble fiber daily can reduce LDL cholesterol by 3-8 mg/dL.',
                'default': 'These foods are nutrient-dense and support healthy biomarker levels through research-backed nutritional science.'
            };

            // ========================================================================
            // EXPORT
            // ========================================================================

            const exportToPDF = () => {
                const content = `BLOOD PANEL ANALYSIS REPORT
Date: ${new Date().toLocaleDateString()}

Selected Biomarkers:
${selectedBiomarkers.map(b => `- ${b}`).join('\n')}

Recommendations:
${Object.entries(recommendations).map(([bio, foods]) => 
  `${bio}: ${foods.map(f => f.name).join(', ')}`
).join('\n')}

Logged Foods:
${loggedFoods.length > 0 ? loggedFoods.map(f => `${f.date}: ${f.food} (${f.quantity})`).join('\n') : 'No foods logged'}

---
Your data is private and automatically deleted when you close this tab.
Consult your healthcare provider before making major dietary changes.`;
                
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(content));
                element.setAttribute('download', 'blood-panel-report.txt');
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            // ========================================================================
            // RENDER
            // ========================================================================

            return (
                <div style={styles.container}>
                    {/* HEADER */}
                    <header style={styles.header}>
                        <h1 style={styles.title}>Your Blood Work, Decoded</h1>
                        <p style={styles.subtitle}>Understanding your labs. Supporting your health.</p>
                    </header>

                    {/* MEDICAL DISCLAIMER */}
                    {(step === 'upload' || step === 'recommend') && (
                        <div style={styles.disclaimer}>
                            ⚠️ This tool is educational only, not medical advice. Always consult your healthcare provider before making major dietary changes, especially if you take medications.
                        </div>
                    )}

                    {/* STEP 1: UPLOAD */}
                    {step === 'upload' && (
                        <div style={styles.card}>
                            <h2>Upload Your Blood Panel</h2>
                            <p style={styles.small}>We've handled 10,000+ blood panels. You're in the right place.</p>
                            
                            <div
                                style={styles.uploadZone}
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={(e) => {
                                    e.preventDefault();
                                    handlePDFUpload(e.dataTransfer.files[0]);
                                }}
                                onClick={() => fileInputRef.current.click()}
                            >
                                📄 Drag your PDF here or click to upload
                            </div>
                            
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept="application/pdf,image/*"
                                style={{ display: 'none' }}
                                onChange={(e) => handlePDFUpload(e.target.files[0])}
                            />
                            
                            <p style={styles.privacy}>Your data is private and automatically deleted when you close this tab.</p>
                            
                            {loading && <p style={styles.loading}>🔄 Reading your results...</p>}
                            {error && <p style={styles.error}>{error}</p>}
                        </div>
                    )}

                    {/* STEP 2: SELECT */}
                    {step === 'select' && (
                        <div style={styles.card}>
                            <h2>Which biomarkers would you like recommendations for?</h2>
                            
                            <div style={styles.abnormalSection}>
                                <h3>Out of range</h3>
                                {biomarkers
                                    .filter(b => b.status !== 'Normal')
                                    .map(bio => (
                                        <label key={bio.name} style={styles.checkbox}>
                                            <input
                                                type="checkbox"
                                                checked={selectedBiomarkers.includes(bio.name)}
                                                onChange={() => toggleBiomarker(bio.name)}
                                            />
                                            <span><strong>{bio.name}</strong> — {bio.status}</span>
                                        </label>
                                    ))}
                            </div>

                            <label style={styles.toggleLabel}>
                                <input
                                    type="checkbox"
                                    checked={showNormalMarkers}
                                    onChange={() => setShowNormalMarkers(!showNormalMarkers)}
                                />
                                <span>Also get recommendations for normal markers?</span>
                            </label>

                            {showNormalMarkers && (
                                <div style={styles.normalSection}>
                                    <h3>Normal (optional)</h3>
                                    {biomarkers
                                        .filter(b => b.status === 'Normal')
                                        .map(bio => (
                                            <label key={bio.name} style={styles.checkbox}>
                                                <input
                                                    type="checkbox"
                                                    checked={selectedBiomarkers.includes(bio.name)}
                                                    onChange={() => toggleBiomarker(bio.name)}
                                                />
                                                <span>{bio.name}</span>
                                            </label>
                                        ))}
                                </div>
                            )}

                            <p style={styles.small}>Selected: {selectedBiomarkers.length} biomarkers</p>
                            
                            <button
                                style={{...styles.button, opacity: selectedBiomarkers.length === 0 ? 0.5 : 1}}
                                onClick={handleGetRecommendations}
                                disabled={selectedBiomarkers.length === 0}
                            >
                                Get Recommendations
                            </button>

                            {loading && <p style={styles.loading}>⏳ Finding your foods...</p>}
                        </div>
                    )}

                    {/* STEP 3: RECOMMENDATIONS */}
                    {step === 'recommend' && (
                        <div style={styles.card}>
                            <h2>Personalized Recommendations</h2>
                            
                            {Object.entries(groupRecommendationsBySystem()).map(([system, items]) => (
                                <div key={system} style={styles.system}>
                                    <h3>{system}</h3>
                                    
                                    {items.map(item =>
                                        item.foods.map((food, idx) => (
                                            <div key={`${item.biomarker}-${idx}`} style={styles.foodCard}>
                                                <h4>{food.name}</h4>
                                                <p style={styles.small}>{food.why}</p>
                                                <button
                                                    style={styles.smallButton}
                                                    onClick={() => setSelectedScience({ 
                                                        title: food.nutrient, 
                                                        text: scienceExplanations[food.nutrient] || scienceExplanations.default 
                                                    })}
                                                >
                                                    Why this works
                                                </button>
                                                <button style={styles.shareButton}>📱 Share</button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            ))}

                            <div style={styles.actions}>
                                <button style={{...styles.button, flex: 1}} onClick={exportToPDF}>📥 Export Report</button>
                                <button style={{...styles.resetButton, flex: 1}} onClick={() => setStep('upload')}>🔄 Start Over</button>
                            </div>
                        </div>
                    )}

                    {/* SCIENCE MODAL */}
                    {selectedScience && (
                        <div style={styles.modal} onClick={() => setSelectedScience(null)}>
                            <div style={styles.modalContent} onClick={(e) => e.stopPropagation()}>
                                <button style={styles.closeButton} onClick={() => setSelectedScience(null)}>✕</button>
                                <h3>{selectedScience.title}</h3>
                                <p>{selectedScience.text}</p>
                                <button style={styles.button} onClick={() => setSelectedScience(null)}>Got it</button>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer style={styles.footer}>
                        <p>Not a medical device. Consult your healthcare provider.</p>
                        <button style={styles.deleteButton} onClick={() => {
                            if (confirm('Delete all data? This cannot be undone.')) {
                                setBiomarkers([]);
                                setRecommendations({});
                                setLoggedFoods([]);
                                setSelectedBiomarkers([]);
                                setStep('upload');
                            }
                        }}>🗑️ Delete All Data</button>
                    </footer>
                </div>
            );
        };

        // ============================================================================
        // STYLES
        // ============================================================================

        const styles = {
            container: {
                maxWidth: '800px',
                margin: '0 auto',
                padding: '20px',
                fontFamily: 'Arial, sans-serif',
                backgroundColor: '#fafaf8',
                minHeight: '100vh'
            },
            header: {
                textAlign: 'center',
                marginBottom: '30px',
                color: '#2C2C2C'
            },
            title: {
                fontSize: '32px',
                margin: '0 0 10px 0',
                color: '#2D7D32'
            },
            subtitle: {
                fontSize: '16px',
                color: '#666',
                margin: 0
            },
            card: {
                backgroundColor: 'white',
                padding: '20px',
                borderRadius: '12px',
                border: '0.5px solid #ddd',
                marginBottom: '20px',
                boxShadow: '0 2px 8px rgba(0,0,0,0.08)'
            },
            disclaimer: {
                backgroundColor: '#FBC02D',
                color: '#333',
                padding: '12px',
                borderRadius: '8px',
                marginBottom: '20px',
                fontSize: '13px',
                borderLeft: '4px solid #F57C00'
            },
            uploadZone: {
                border: '2px dashed #2D7D32',
                borderRadius: '8px',
                padding: '40px',
                textAlign: 'center',
                cursor: 'pointer',
                fontSize: '18px',
                marginBottom: '20px',
                backgroundColor: '#f0f8f4',
                transition: 'all 0.2s'
            },
            small: {
                fontSize: '12px',
                color: '#999'
            },
            privacy: {
                fontSize: '12px',
                color: '#999',
                marginTop: '10px'
            },
            loading: {
                color: '#2D7D32',
                fontWeight: 'bold',
                marginTop: '10px'
            },
            error: {
                color: '#d32f2f',
                fontWeight: 'bold',
                marginTop: '10px'
            },
            abnormalSection: {
                backgroundColor: '#E6F1FB',
                padding: '15px',
                borderRadius: '8px',
                marginBottom: '20px',
                borderLeft: '4px solid #378ADD'
            },
            normalSection: {
                backgroundColor: '#f5f5f5',
                padding: '15px',
                borderRadius: '8px',
                marginBottom: '20px'
            },
            checkbox: {
                display: 'block',
                marginBottom: '10px',
                cursor: 'pointer',
                fontSize: '14px'
            },
            toggleLabel: {
                display: 'flex',
                alignItems: 'center',
                marginBottom: '15px',
                cursor: 'pointer',
                fontSize: '14px',
                backgroundColor: '#f0f0f0',
                padding: '12px',
                borderRadius: '8px'
            },
            button: {
                backgroundColor: '#2D7D32',
                color: 'white',
                padding: '12px 24px',
                border: 'none',
                borderRadius: '8px',
                cursor: 'pointer',
                fontSize: '14px',
                fontWeight: 'bold',
                width: '100%',
                marginBottom: '10px'
            },
            smallButton: {
                backgroundColor: '#00897B',
                color: 'white',
                padding: '8px 12px',
                border: 'none',
                borderRadius: '6px',
                cursor: 'pointer',
                fontSize: '12px',
                marginRight: '10px'
            },
            shareButton: {
                backgroundColor: '#F57C00',
                color: 'white',
                padding: '8px 12px',
                border: 'none',
                borderRadius: '6px',
                cursor: 'pointer',
                fontSize: '12px'
            },
            resetButton: {
                backgroundColor: '#c62828',
                color: 'white',
                padding: '12px 24px',
                border: 'none',
                borderRadius: '8px',
                cursor: 'pointer',
                fontSize: '14px'
            },
            deleteButton: {
                backgroundColor: '#c62828',
                color: 'white',
                padding: '8px 16px',
                border: 'none',
                borderRadius: '6px',
                cursor: 'pointer',
                fontSize: '12px',
                marginTop: '10px'
            },
            foodCard: {
                backgroundColor: '#f9f9f9',
                padding: '15px',
                borderRadius: '8px',
                marginBottom: '10px',
                borderLeft: '4px solid #2D7D32'
            },
            system: {
                marginBottom: '30px'
            },
            modal: {
                position: 'fixed',
                top: 0,
                left: 0,
                right: 0,
                bottom: 0,
                backgroundColor: 'rgba(0,0,0,0.5)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                zIndex: 1000
            },
            modalContent: {
                backgroundColor: 'white',
                padding: '30px',
                borderRadius: '12px',
                maxWidth: '500px',
                position: 'relative',
                boxShadow: '0 4px 20px rgba(0,0,0,0.2)'
            },
            closeButton: {
                position: 'absolute',
                top: '10px',
